<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOFA — Sign Up | Online Furniture Store</title>
    <meta name="description" content="Create a new SOFA account to start shopping premium furniture.">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        /* Flip the signup panel layout */
        .signup-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: calc(100vh - 54px);
        }
        /* Left = form */
        .signup-left {
            background: #f8f0ee;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 60px;
        }
        /* Right = image panel */
        .signup-right {
            background: url('https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=800&q=80') center/cover no-repeat;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }
        .signup-right::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(160,140,140,0.55);
            backdrop-filter: blur(2px);
        }
        .signup-right .signup-right-content {
            position: relative;
            z-index: 1;
            color: #fff;
        }
        .signup-right .signup-right-content h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .signup-right .signup-right-content p {
            font-size: 0.85rem;
            opacity: 0.85;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .signup-right .signup-right-content .auth-switch-btn {
            display: inline-block;
            border: 2px solid #fff;
            color: #fff;
            padding: 10px 32px;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.25s, color 0.25s;
            cursor: pointer;
            background: transparent;
        }
        .signup-right .signup-right-content .auth-switch-btn:hover {
            background: #fff;
            color: #666;
        }
        .msg { margin-top: 12px; text-align: center; font-size: 0.82rem; padding: 8px 12px; border-radius: 6px; display: none; }
        .msg.error   { background: #fdecea; color: #c0392b; display: block; }
        .msg.success { background: #eafaf1; color: #1e8449; display: block; }
    </style>
</head>
<body class="auth-body">

    <!-- Header -->
    <header class="auth-header">
        <a href="index.html" class="brand">SOFA</a>
    </header>

    <!-- Auth Container -->
    <div class="signup-container">

        <!-- Left = Sign Up form -->
        <div class="signup-left">
            <div class="auth-form-box">
                <h2>Sign up</h2>

                <div class="form-group">
                    <input type="text" id="su-username" placeholder="Username" autocomplete="username">
                </div>
                <div class="form-group">
                    <input type="email" id="su-email" placeholder="Email" autocomplete="email">
                </div>
                <div class="form-group">
                    <input type="password" id="su-password" placeholder="Password" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <input type="password" id="su-confirm" placeholder="Confirm Password" autocomplete="new-password">
                </div>

                <button class="auth-btn" type="button" onclick="handleSignup()">Sign up</button>
                <p id="signup-msg" class="msg"></p>

                <p class="social-divider">Or Sign up with social platforms</p>
                <div class="social-icons">
                    <a href="#" title="Facebook">f</a>
                    <a href="#" title="Twitter">t</a>
                    <a href="#" title="Google">G</a>
                    <a href="#" title="GitHub">
                        <ion-icon name="logo-github" style="font-size:0.95rem;"></ion-icon>
                    </a>
                </div>
            </div>
        </div>

        <!-- Right = welcome back panel -->
        <div class="signup-right">
            <div class="signup-right-content">
                <h2>One of us ?</h2>
                <p>Welcome back, please sign in</p>
                <a href="login.html" class="auth-switch-btn">Sign in</a>
            </div>
        </div>

    </div>

    <script>
        function handleSignup() {
            const username = document.getElementById('su-username').value.trim();
            const email    = document.getElementById('su-email').value.trim();
            const password = document.getElementById('su-password').value;
            const confirm  = document.getElementById('su-confirm').value;
            const msg      = document.getElementById('signup-msg');

            if (!username || !email || !password || !confirm) {
                showMsg(msg, 'error', 'Please fill in all fields.');
                return;
            }
            if (password !== confirm) {
                showMsg(msg, 'error', 'Passwords do not match.');
                return;
            }
            if (password.length < 4) {
                showMsg(msg, 'error', 'Password must be at least 4 characters.');
                return;
            }

            // Save account to localStorage
            localStorage.setItem('sofa_user', JSON.stringify({ username, email, password }));
            showMsg(msg, 'success', '✔ Account created! Redirecting to login...');
            setTimeout(() => { window.location.href = 'login.html'; }, 1400);
        }

        function showMsg(el, type, text) {
            el.className = 'msg ' + type;
            el.textContent = text;
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignup(); });
    </script>
</body>
</html>
